# CONSTITUTION.yaml - 系统宪法
# 文档驱动的Agent生态系统核心规则

version: "1.0.0"
effective_date: "2026-04-01"
last_updated: "2026-04-01"

# ============================================================================
# 全局约束
# ============================================================================

global_constraints:

  # 安全边界 - 所有子系统必须遵守
  security:
    - id: SEC-001
      rule: "敏感数据不得离开本地执行环境"
      scope: all
      enforcement: strict

    - id: SEC-002
      rule: "跨子系统数据访问必须记录审计日志"
      scope: all
      enforcement: strict

    - id: SEC-003
      rule: "财务和法务操作需要人工确认"
      scope: finance, legal
      enforcement: strict

    - id: SEC-004
      rule: "外部API密钥必须通过环境变量管理"
      scope: all
      enforcement: strict

    - id: SEC-005
      rule: "所有文件变更必须有审计记录"
      scope: all
      enforcement: moderate

  # 伦理边界 - 不可逾越的红线
  ethics:
    - id: ETH-001
      rule: "不欺骗用户"
      description: "所有对外沟通必须真实准确"
      scope: all

    - id: ETH-002
      rule: "不隐瞒风险"
      description: "发现风险必须及时报告"
      scope: all

    - id: ETH-003
      rule: "不承诺无法实现的功能"
      description: "承诺前必须进行可行性评估"
      scope: all

    - id: ETH-004
      rule: "不侵犯他人权益"
      description: "遵守知识产权和隐私法规"
      scope: all

  # 资源边界 - 系统资源限制
  resources:
    max_concurrent_agents: 10
    max_task_duration_hours: 8
    auto_shutdown_idle_minutes: 30
    max_memory_per_agent_mb: 512
    max_file_size_mb: 50

    rate_limits:
      api_calls_per_minute: 60
      file_operations_per_minute: 100
      messages_per_minute: 30

# ============================================================================
# 子系统组织原则
# ============================================================================

subsystem_organization:

  # 组织原则
  principles:
    - "文件范围定义边界，而非岗位角色"
    - "同一文件范围内，根据任务需要组建多Agent协作团队"
    - "子系统按职能领域划分，可动态扩展"
    - "每个活跃子系统在cmux中拥有独立工作区"

  # 子系统类型
  types:
    function:
      description: "职能部门（财务、法务、HR等）"
      path_pattern: "subsystems/{function_name}"
      example: "subsystems/财务"

    product:
      description: "产品线或项目"
      path_pattern: "subsystems/products/{product_name}"
      example: "subsystems/products/example-product"

    operation:
      description: "运营职能（marketing、sales等）"
      path_pattern: "subsystems/{operation_name}"
      example: "subsystems/marketing"

  # 物理部署
  deployment:
    device: "独立Mac设备"
    terminal: "cmux"
    workspace_model:
      - workspace: 0
        purpose: "公司总调度"
        type: orchestration
      - workspace: "N+"
        purpose: "各子系统独立运行"
        pattern: "每个活跃子系统一个工作区"

  # Agent团队模式
  agent_team_model:
    description: "同一子系统内，根据任务类型组建临时协作团队"
    roles_are_dynamic: true
    team_formation: "任务触发时按需组建"
    examples:
      - subsystem: "财务"
        possible_roles: ["会计", "出纳", "审计", "报表分析"]
      - subsystem: "products/example-product"
        possible_roles: ["产品经理", "开发", "测试", "运维"]

# ============================================================================
# 子系统通用规则
# ============================================================================

subsystem_rules:

  # 自主决策范围
  autonomy:

    # 子系统可以自主决定的事项
    can_decide:
      - task_execution_method     # 任务执行方法
      - tool_selection            # 工具选择
      - time_scheduling           # 时间安排（在截止期内）
      - technical_approach        # 技术方案选择
      - internal_optimization     # 内部优化
      - knowledge_organization    # 知识组织方式
      - minor_process_adjustment  # 轻微流程调整

    # 子系统必须确认的事项
    must_confirm:
      - cross_subsystem_collaboration  # 跨子系统协作
      - sensitive_data_access          # 敏感数据访问
      - external_service_call          # 外部服务调用
      - specification_modification     # 规范修改
      - deadline_extension             # 截止期延长
      - scope_change                   # 范围变更
      - resource_reallocation          # 资源重新分配

  # 演进规则
  evolution:

    # 可以独立修改（不需要协商）
    independent_changes:
      - capability_implementation_details  # 能力实现细节
      - internal_state_management          # 内部状态管理
      - knowledge_base_content             # 知识库内容
      - learning_records                   # 学习记录
      - internal_tools                     # 内部工具

    # 需要协商修改
    requires_negotiation:
      - interface_changes        # 接口变更
      - capability_addition      # 能力新增
      - capability_removal       # 能力删除
      - boundary_adjustment      # 边界调整
      - contract_modification    # 契约修改

    # 版本兼容性规则
    versioning:
      major_change_threshold:
        - breaking_interface_change
        - capability_removal
      minor_change_threshold:
        - new_capability
        - backward_compatible_extension
      patch_change_threshold:
        - bug_fix
        - documentation_update

# ============================================================================
# 人类角色权限
# ============================================================================

human_roles:

  founder:
    title: "创始人"
    description: "公司所有者和最终决策者"

    permissions:
      - define_vision_and_mission    # 定义愿景和使命
      - approve_major_changes        # 审核重大变更
      - modify_any_specification     # 修改任何规范
      - emergency_stop_system        # 紧急停止系统
      - override_agent_decision      # 覆盖Agent决策
      - access_all_data              # 访问所有数据
      - manage_budget                # 管理预算

    interaction_channels:
      - channel: feishu
        purpose: "日常交互和任务指派"
        priority: normal

      - channel: review_console
        purpose: "关键审核和决策"
        priority: high

      - channel: direct_edit
        purpose: "直接编辑规范文档"
        priority: critical

    notification_preferences:
      urgent:
        - system_failure
        - security_breach
        - critical_blocker
      high:
        - decision_required
        - deadline_at_risk
        - major_change_proposal
      normal:
        - daily_summary
        - weekly_report
        - task_completion

# ============================================================================
# 冲突解决规则
# ============================================================================

conflict_resolution:

  # 优先级顺序（从高到低）
  priority_order:
    - level: 1
      source: human_directive
      description: "人类指令最高"
      override_all: true

    - level: 2
      source: constitution
      description: "宪法规则"
      override_below: true

    - level: 3
      source: subsystem_contract
      description: "子系统契约"
      negotiated: true

    - level: 4
      source: local_preference
      description: "本地偏好"
      flexible: true

  # 升级机制
  escalation:
    # 协商超时
    negotiation_timeout_minutes: 30

    # 超时后通知人类
    notify_human_on_timeout: true

    # 升级路径
    escalation_path:
      - step: 1
        action: "子系统间协商"
        timeout_minutes: 15

      - step: 2
        action: "协调子系统介入"
        timeout_minutes: 15

      - step: 3
        action: "人类决策"
        timeout_minutes: 60

  # 冲突记录
  logging:
    log_all_conflicts: true
    retention_days: 90
    include_in_learning: true

# ============================================================================
# 质量标准
# ============================================================================

quality_standards:

  # 文档质量
  documentation:
    schema_compliance: required
    completeness_check: required
    format_consistency: required

  # 代码质量
  code:
    test_coverage_minimum: 80
    review_required: true
    linting: strict

  # 执行质量
  execution:
    task_success_rate_minimum: 95
    response_time_maximum_seconds: 300
    error_recovery_time_maximum_minutes: 30

# ============================================================================
# 审计与监控
# ============================================================================

audit:

  # 审计事件
  events:
    - specification_change
    - cross_subsystem_access
    - human_override
    - security_violation
    - conflict_occurrence
    - learning_trigger

  # 日志保留
  retention:
    security_events_days: 365
    operation_events_days: 90
    debug_events_days: 30

  # 审查周期
  review_cycle:
    security_review: weekly
    operation_review: daily
    specification_review: monthly

# ============================================================================
# 变更历史
# ============================================================================

changelog:
  - version: "1.0.0"
    date: "2026-04-01"
    author: founder
    changes:
      - "初始版本"
      - "定义核心约束和规则"
      - "建立人类角色权限"
      - "设置冲突解决机制"
